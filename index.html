<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백동진 동인지피디아</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <h1 class="logo">DONGINJI <span class="pedia">PEDIA</span></h1>
        </div>
    </header>

    <main class="container">
        
        <section class="user-profile">
            <img src="my-profile.jpg" class="profile-pic">
            <div class="user-info">
                <h2>백동진</h2>
                <p>안녕하세요. 동인지 평론하는 백동진입니다.</p>
                <p>작성한 코멘트 <span>21</span></p>
            </div>
        </section>

        <hr>

        <section class="comment-grid">
            <div class="comment-card">
                <div class="card-header">
                    <span class="movie-title">Happily Ever After, 2026 | 그믐&삼사</span>
                    <span class="rating">★ 5</span>
                </div>
                <div class="comment-content">
                    <img src="card/01.jpeg" class="comment-pic">
                    <p class="comment-text">리비우스x키이스 동인지</p>
                </div>
                <div class="card-footer">
                    <div class="rating-container">
                        <span class="rating-text">👍 28 💬 별점을 주시겠어요?</span>
                        <div class="star-rating">
                            <input type="radio" id="1-5-stars" name="rating1" value="5" />
                            <label for="1-5-stars" class="star">&#9733;</label>
                            <input type="radio" id="1-4-stars" name="rating1" value="4" />
                            <label for="1-4-stars" class="star">&#9733;</label>
                            <input type="radio" id="1-3-stars" name="rating1" value="3" />
                            <label for="1-3-stars" class="star">&#9733;</label>
                            <input type="radio" id="1-2-stars" name="rating1" value="2" />
                            <label for="1-2-stars" class="star">&#9733;</label>
                            <input type="radio" id="1-1-star" name="rating1" value="1" />
                            <label for="1-1-star" class="star">&#9733;</label>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="comment-grid">
            <div class="comment-card">
                <div class="card-header">
                    <span class="movie-title">아퀴노의 일기, 2026 | 긍</span>
                    <span class="rating">★ 5</span>
                </div>
                <div class="comment-content">
                    <img src="card/02.jpeg" class="comment-pic">
                    <p class="comment-text">이 일기는 중세 벨로나에서부터 시작되었으며...</p>
                </div>
                <div class="card-footer">
                    <div class="rating-container">
                        <span class="rating-text">👍 28 💬 별점을 주시겠어요?</span>
                        <div class="star-rating">
                            <input type="radio" id="2-5-stars" name="rating2" value="5" />
                            <label for="2-5-stars" class="star">&#9733;</label>
                            <input type="radio" id="2-4-stars" name="rating2" value="4" />
                            <label for="2-4-stars" class="star">&#9733;</label>
                            <input type="radio" id="2-3-stars" name="rating2" value="3" />
                            <label for="2-3-stars" class="star">&#9733;</label>
                            <input type="radio" id="2-2-stars" name="rating2" value="2" />
                            <label for="2-2-stars" class="star">&#9733;</label>
                            <input type="radio" id="2-1-star" name="rating2" value="1" />
                            <label for="2-1-star" class="star">&#9733;</label>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // 모든 별점 입력 요소에 이벤트를 연결합니다.
        document.querySelectorAll('.star-rating input').forEach(star => {
            star.addEventListener('change', () => {
                alert(`와! ${star.value}점을 주셨네요! 감사합니다.`);
            });
        });
    </script>
</body>
</html>
