<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 영화 코멘트 - 왓챠피디아 스타일</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <h1 class="logo">WATCHA <span class="pedia">PEDIA</span></h1>
        </div>
    </header>

    <main class="container">
        <section class="user-profile">
            <div class="profile-pic"></div>
            <div class="user-info">
                <h2>사용자 이름</h2>
                <p>작성한 코멘트 <span>12</span></p>
            </div>
        </section>

        <hr>

        <section class="comment-grid">
            <div class="comment-card">
                <div class="card-header">
                    <span class="movie-title">영화 제목 1</span>
                    <span class="rating">★ 4.5</span>
                </div>
                <p class="comment-text">
                    정말 감동적인 영화였습니다. 연출과 연기 모두 완벽했어요. 다시 보고 싶은 작품입니다.
                </p>
                <div class="card-footer">
                    <span>👍 12</span>
                    <span>💬 3</span>
                </div>
            </div>

            <div class="comment-card">
                <div class="card-header">
                    <span class="movie-title">영화 제목 2</span>
                    <span class="rating">★ 3.0</span>
                </div>
                <p class="comment-text">
                    나쁘지 않았지만 중반부가 조금 지루했습니다. 킬링타임용으로는 적당하네요.
                </p>
                <div class="card-footer">
                    <span>👍 5</span>
                    <span>💬 0</span>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
