    var disqus_config = function () {
        this.page.url = 'https://mingoos99-ui.github.io/testhome/';  // 내 실제 사이트 주소

    };

    (function() { // 아래는 복사한 코드 그대로 두시면 됩니다.
        var d = document, s = d.createElement('script');
        s.src = 'https://donginji-pedia.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
    })();
</script>
